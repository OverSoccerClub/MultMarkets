version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: multmarkets-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-multmarkets}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-multmarkets_dev}
      POSTGRES_DB: ${POSTGRES_DB:-multmarkets}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-multmarkets}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: multmarkets-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: multmarkets-api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-multmarkets}:${POSTGRES_PASSWORD:-multmarkets_dev}@postgres:5432/${POSTGRES_DB:-multmarkets}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app/apps/api
      - /app/node_modules

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: multmarkets-web
    restart: unless-stopped
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://api:3001/api/v1
      NEXT_PUBLIC_WS_URL: http://api:3001
    ports:
      - '3000:3000'
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
